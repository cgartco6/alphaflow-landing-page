<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tester Program | AlphaFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        form { max-width: 500px; margin: 40px auto; text-align: left; background: var(--dark-grey); padding: 30px; border-radius: 8px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="gold-text">Join the Founders Program</h1>
        <p>We’re selecting a limited group of men to test AlphaFlow before public launch.</p>
        
        <div class="grid">
            <div class="card">Free Product Sample</div>
            <div class="card">Early Access Pricing</div>
            <div class="card">Full Support Guide</div>
        </div>

        <form>
            <label>Name</label>
            <input type="text" placeholder="Your Name" required>
            <label>Age</label>
            <input type="number" placeholder="Your Age" required>
            <label>Performance Goals</label>
            <select>
                <option>Increase Energy</option>
                <option>Improve Stamina</option>
                <option>General Vitality</option>
            </select>
            <button type="submit" class="btn btn-gold" style="width:100%">Apply Now</button>
        </form>
    </div>
</body>
</html>
