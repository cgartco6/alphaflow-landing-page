<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | System Deviation - ALPHAFLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #9b7b39 0%, #d4af37 45%, #f9e4b7 70%, #a67c00 100%);
            --black: #050505;
            --charcoal: #0f0f0f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--black); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Background Gradient */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(5, 5, 5, 0) 70%);
            z-index: 1;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -10px;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.2;
            position: relative;
        }

        .content {
            margin-top: -60px;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 15px;
        }

        h1 em {
            font-family: 'Playfair Display', serif;
            text-transform: lowercase;
            font-weight: 400;
            letter-spacing: 0;
            color: #d4af37;
        }

        p {
            color: #888;
            max-width: 450px;
            margin: 0 auto 40px;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .btn-luxury {
            position: relative;
            padding: 20px 45px;
            background: transparent;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 3px;
            font-size: 0.8rem;
            border: 1px solid #d4af37;
            transition: 0.5s;
            display: inline-block;
        }

        .btn-luxury:hover {
            color: #000;
            background: #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .logo-small {
            position: absolute;
            bottom: 40px;
            letter-spacing: 8px;
            font-weight: 900;
            font-size: 0.7rem;
            opacity: 0.4;
            width: 100%;
            left: 0;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="error-code">404</div>
        <div class="content">
            <h1>System <em>deviation.</em></h1>
            <p>You’ve reached a point beyond the performance curve. The page you are looking for has been moved or no longer exists.</p>
            <a href="index.html" class="btn-luxury">Return to Peak</a>
        </div>
    </div>

    <div class="logo-small">ALPHAFLOW LABORATORY</div>

</body>
</html>
