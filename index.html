<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHAFLOW | Elite Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: linear-gradient(135deg, #9b7b39 0%, #d4af37 45%, #f9e4b7 70%, #a67c00 100%);
            --gold-solid: #d4af37;
            --black: #050505;
            --charcoal: #0f0f0f;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--black); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* --- LOGO DESIGN --- */
        .logo-wrapper { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 35px; height: 35px;
            background: var(--gold);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
        }
        .logo-icon i { color: #000; font-size: 1.2rem; }
        .logo-text { font-weight: 900; letter-spacing: 6px; font-size: 1.2rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- NAVIGATION --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 6%; position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a { text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; opacity: 0.6; }
        .nav-links a:hover { opacity: 1; color: var(--gold-solid); }

        /* --- ACTUAL HERO SECTION --- */
        .hero {
            position: relative; height: 100vh; width: 100%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }
        
        /* Simulated Background Photo/Video Overlay */
        .hero-bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070') center/cover no-repeat;
            opacity: 0.2; mix-blend-mode: luminosity;
        }

        .hero-content { z-index: 10; padding: 0 20px; }
        .hero-content span { font-size: 0.9rem; letter-spacing: 8px; color: var(--gold-solid); font-weight: 300; }
        .hero-content h1 { font-size: clamp(3.5rem, 10vw, 7rem); font-weight: 900; letter-spacing: -2px; line-height: 0.9; margin: 20px 0; text-transform: uppercase; }
        .hero-content h1 em { font-family: 'Playfair Display', serif; font-weight: 400; text-transform: lowercase; letter-spacing: 0; font-style: italic; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- PRODUCT SHOT (The Photos) --- */
        .product-hero-frame {
            position: relative; width: 300px; height: 450px; margin: 40px auto;
            perspective: 1000px;
        }
        .real-product-image {
            width: 100%; height: 100%;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,1), 0 0 40px rgba(212, 175, 55, 0.1);
            display: flex; align-items: center; justify-content: center;
            transform: rotateY(-10deg) rotateX(5deg);
        }
        /* Placeholder label for your photo */
        .label-wrap {
            width: 100%; background: var(--gold); color: #000; padding: 20px;
            font-weight: 900; letter-spacing: 3px; transform: scale(1.1);
        }

        /* --- HAMBURGER MENU --- */
        .hamburger { display: none; cursor: pointer; color: var(--gold-solid); font-size: 1.5rem; }

        /* --- BUTTONS --- */
        .btn-luxury {
            position: relative; padding: 22px 50px; background: transparent; color: #fff;
            text-transform: uppercase; font-weight: 900; letter-spacing: 3px; font-size: 0.8rem;
            border: 1px solid var(--gold-solid); cursor: pointer; transition: 0.5s; overflow: hidden;
        }
        .btn-luxury:hover { color: #000; }
        .btn-luxury::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--gold); transition: 0.5s; z-index: -1;
        }
        .btn-luxury:hover::before { left: 0; }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: block; }
            .hero-content h1 { font-size: 3.5rem; }
            .product-hero-frame { width: 220px; height: 350px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-wrapper">
            <div class="logo-icon"><i class="fas fa-bolt"></i></div>
            <div class="logo-text">ALPHAFLOW</div>
        </div>
        <ul class="nav-links">
            <li><a href="#">The System</a></li>
            <li><a href="#">Science</a></li>
            <li><a href="#">Tester Access</a></li>
        </ul>
        <div class="hamburger">
            <i class="fas fa-bars"></i>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-bg-overlay"></div>
        <div class="hero-content">
            <span>DEFINING THE APEX</span>
            <h1>Ready <em>when it</em> Matters.</h1>
            
            <div class="product-hero-frame">
                <div class="real-product-image">
                    <div class="label-wrap">
                        ALPHAFLOW CORE
                    </div>
                </div>
            </div>

            <p style="color: #888; margin-bottom: 40px; letter-spacing: 1px;">Precision-engineered vitality for the high-performance man.</p>
            <button class="btn-luxury">Secure Early Access</button>
        </div>
    </section>

    <script>
        document.querySelector('.hamburger').addEventListener('click', function() {
            alert('Mobile Menu Open - Link your Shopify/Wix drawer here.');
        });
    </script>
</body>
</html>
